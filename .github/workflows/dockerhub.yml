name: Build & Push to DockerHub

on:
  push:
    branches:
      - main   # Se ejecuta cada vez que hay un push a main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Obtener el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Iniciar sesión en DockerHub usando secrets del repo
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Configurar Docker Buildx (para builds multi-plataforma si se necesita)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Construir y subir la imagen a DockerHub
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Etiqueta: TU_USUARIO/pokeneas:latest y TU_USUARIO/pokeneas:<commit-sha>
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pokeneas:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pokeneas:${{ github.sha }}
